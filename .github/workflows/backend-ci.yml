name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "docker-compose.yml"
      - ".env.example"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "docker-compose.yml"
      - ".env.example"
  workflow_dispatch:

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      KMA_SERVICE_KEY: test-key-for-ci
      TESTCONTAINERS_RYUK_DISABLED: "false"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Docker
        run: docker version

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew clean test --no-daemon

  docker-build:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t uvalert-backend:ci ./backend