services:
  postgres:
    image: postgres:16
    container_name: uvmanger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: uvmanger
      POSTGRES_USER: uvmanger
      POSTGRES_PASSWORD: uvmanger
      TZ: Asia/Seoul
    volumes:
      - uvmanger-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uvmanger -d uvmanger"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: uvmanger-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/uvmanger
      DATABASE_USERNAME: uvmanger
      DATABASE_PASSWORD: uvmanger
      KMA_SERVICE_KEY: ${KMA_SERVICE_KEY}
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  uvmanger-postgres-data: