services:
  postgres:
    image: postgres:16
    container_name: uvalert-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: uvalert
      POSTGRES_USER: uvalert
      POSTGRES_PASSWORD: uvalert
    volumes:
      - uvalert-postgres-data:/var/lib/postgresql/data

volumes:
  uvalert-postgres-data: